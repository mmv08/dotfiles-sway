# Mac-like idle flow:
# - lock after 5 minutes
# - turn displays off 1 minute later
# - suspend after 15 minutes, but only if the session is still locked
set $lock_timeout 300
set $screen_timeout 60
set $suspend_timeout 900

# Manual lock, similar to macOS "lock screen now".
bindsym $mod+Ctrl+l exec loginctl lock-session

exec LT="$lock_timeout" ST="$screen_timeout" SUSP="$suspend_timeout" && \
    swayidle -w \
        timeout $LT 'loginctl lock-session' \
        timeout $((LT + ST)) 'swaymsg "output * power off"' \
                      resume 'swaymsg "output * power on"' \
        timeout $ST 'pgrep -xu "$USER" swaylock >/dev/null && swaymsg "output * power off"' \
             resume 'pgrep -xu "$USER" swaylock >/dev/null && swaymsg "output * power on"' \
        timeout $SUSP 'pgrep -xu "$USER" swaylock >/dev/null && systemctl suspend' \
        before-sleep 'swaylock -f' \
        lock 'swaylock -f' \
        unlock 'pkill -xu "$USER" -SIGUSR1 swaylock'
